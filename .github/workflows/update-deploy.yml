name: Daily Displacement Forecast Update
run-name: Displacement Forecast 🚀
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '15 7 * * *'
    - cron: '15 19 * * *'
jobs:
  update-forecast:
    runs-on: ubuntu-latest
    container: crease/displacement_forecast:latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      # - name: Set up cache for this attempt
      #   uses: actions/cache@v4
      #   id: cache
      #   with:
      #     path: /app/data/reports/report.html
      #     key: cache-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Run forecast process
        run: python /app/process_forecast.py

      - name: Copy outputs to workspace
        run: cp /app/data/* {{ github.workspace }}/data/

      - name: Commit and push any changes
        run: |-
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@users.noreply.github.com"
          git add data/*/report/*.png
          git add data/*/report/*.html
          timestamp=$(date -u)
          git commit -m "Latest data: ${timestamp}" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
